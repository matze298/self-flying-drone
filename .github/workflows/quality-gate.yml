name: Quality gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Python Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install uv
        run: python -m pip install uv
      - name: Set up test environment
        run: ./setup.py --workstream python --workstream sim
      - name: Run pre-commit checks
        run: uv run --group dev prek run --all-files
      - name: Run unit tests
        run: uv run --group dev --group sim pytest
