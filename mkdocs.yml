site_name: Fixed-Wing Autonomy Lab
site_description: A modular buyers and developers guide for safe fixed-wing autonomy experiments.
site_url: https://matze298.github.io/self-flying-drone/
repo_url: https://github.com/matze298/self-flying-drone
repo_name: matze298/self-flying-drone
edit_uri: edit/main/docs/

copyright: "Documentation © 2026 — CC BY 4.0"

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Use dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Use light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - assets/stylesheets/extra.css
extra_javascript:
  - https://unpkg.com/mermaid@10.9.3/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - "1. Start here":
      - "1.1 Overview": index.md
      - "1.2 Learning path": start/learning-path.md
      - "1.3 Design principles": start/design-principles.md
      - "1.4 Configuration chooser": start/configuration-chooser.md
      - "1.5 Roadmap": start/roadmap.md
  - "2. Buyer guide":
      - "2.1 Reference configurations": buy/reference-configurations.md
      - "2.2 Airframe and propulsion": buy/airframe-propulsion.md
      - "2.3 Flight control and navigation": buy/flight-control-navigation.md
      - "2.4 Compute and cameras": buy/compute-cameras.md
      - "2.5 Video, telemetry, and RC": buy/links-radios.md
      - "2.6 Power and wiring": buy/power-wiring.md
      - "2.7 Procurement checklist": buy/procurement-checklist.md
  - "3. Build":
      - "3.1 Mechanical integration": build/mechanical-integration.md
      - "3.2 Wiring and interfaces": build/wiring-interfaces.md
      - "3.3 Assembly and calibration": build/assembly-calibration.md
  - "4. Software":
      - "4.1 System architecture": software/system-architecture.md
      - "4.2 Development stack": software/development-stack.md
      - "4.3 Ground-side inference": software/ground-inference.md
      - "4.4 Onboard inference": software/onboard-inference.md
      - "4.5 Simulation and test tooling": software/simulation-testing.md
  - "5. Implementation":
      - "5.1 First implementation": implementation/index.md
      - "5.2 SITL smoke test": implementation/sitl-smoke-test.md
  - "6. Operations":
      - "6.1 Safety, legal, and ethics": operations/safety-legal.md
      - "6.2 Test gates": operations/test-gates.md
      - "6.3 Failsafe design": operations/failsafe-design.md
  - "A. Appendix":
      - "A.1 Glossary": appendix/glossary.md
      - "A.2 Bill of materials template": appendix/bom-template.md
      - "A.3 Interface contracts": appendix/interface-contracts.md
      - "A.4 Open-source licenses": appendix/open-source-licenses.md
      - "A.5 References": appendix/references.md
