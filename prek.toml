[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-toml" },
    { id = "check-added-large-files" },
    { id = "check-merge-conflict" },
    { id = "mixed-line-ending" },
     { id = "no-commit-to-branch"},
     { id = "check-shebang-scripts-are-executable"},
]

[[repos]]
repo = "local"
hooks = [
    { id = "check-branch-name", name = "check branch name", entry = "uv run python tools/git/check_branch_name.py", language = "system", pass_filenames = false, always_run = true },
    { id = "ruff-format", name = "ruff format", entry = "uv run ruff format .", language = "system", pass_filenames = false, always_run = true },
    { id = "ruff-check", name = "ruff check", entry = "uv run ruff check .", language = "system", pass_filenames = false, always_run = true },
    { id = "ty-check", name = "ty check", entry = "uv run ty check", language = "system", pass_filenames = false, always_run = true },
]
