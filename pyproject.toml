[project]
name = "drone-build"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Matthias Rath", email = "matze29894@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "typer>=0.20.0",
    ]

[project.scripts]
drone-build = "drone_build:main"

[build-system]
requires = ["uv_build>=0.11.25,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "prek>=0.4.8",
    "pytest>=9.1.1",
    "ruff>=0.15.20",
    "ty>=0.0.56",
]
docs = [
    "mkdocs>=1.6.1",
    "mkdocs-material<10.0",
]
sim = [
    "aioconsole>=0.8.2",
    "mavsdk>=3.15.3",
    "pymavlink>=2.4.49",
]

[tool.ruff]
line-length = 120
target-version = "py314"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "COM812", # Avoid conflict with Ruff formatter.
    "D203",   # Use no blank line before class docstrings.
    "D213",   # Use multi-line docstring summaries on the first line.
    "ISC001", # Avoid conflict with Ruff formatter.
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "S101", # Pytest tests use plain assert statements for readable expectations.
]
"tools/sitl/run.py" = [
    "FBT002",  # Typer boolean flags are declared as bool defaults for CLI option ergonomics.
    "PLR0913", # This CLI exposes several independent options; splitting would make help text harder to scan.
    "S603",    # The helper intentionally launches fixed external tools: git, ArduPilot prereqs, and sim_vehicle.py.
    "S607",    # The helper intentionally uses PATH for git so the user's configured Git install is used.
]
"setup.py" = [
    "B008",   # Typer option declarations are intentionally created in parameter defaults.
    "FBT001", # Typer boolean flags are declared as bool parameters by design.
    "FBT002", # Typer's working default-value API requires bool defaults in the signature.
    "FBT003", # Typer option declarations pass bool defaults positionally.
    "S603",   # setup.py executes the fixed local `uv sync` command, not user-provided input.
    "S606",   # setup.py intentionally replaces itself with the user's shell inside `.venv`.
]

[tool.ty.rules]
missing-type-argument = "error"
possibly-unresolved-reference = "warn"
